global:
  resolve_timeout: 5m

route:
  group_by: ["alertname", "severity", "team"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: "default"
  routes:
    - match:
        severity: critical
      receiver: "critical-ops"
      repeat_interval: 30m
    - match:
        severity: high
      receiver: "high-ops"
      repeat_interval: 2h
    - match:
        team: operations
      receiver: "operations"

receivers:
  - name: "default"
    webhook_configs:
      - url: "${OPS_WEBHOOK_URL}"
        send_resolved: true

  - name: "critical-ops"
    webhook_configs:
      - url: "${PAGERDUTY_WEBHOOK_URL}"
        send_resolved: true
      - url: "${SLACK_WEBHOOK_URL}"
        send_resolved: true

  - name: "high-ops"
    webhook_configs:
      - url: "${SLACK_WEBHOOK_URL}"
        send_resolved: true

  - name: "operations"
    webhook_configs:
      - url: "${SLACK_WEBHOOK_URL}"
        send_resolved: true

inhibit_rules:
  - source_match:
      severity: "critical"
    target_match:
      severity: "high"
    equal: ["alertname"]
  - source_match:
      severity: "critical"
    target_match:
      severity: "medium"
    equal: ["alertname"]
