apiVersion: v1
kind: Namespace
metadata:
  name: syroce
  labels:
    app: syroce
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: syroce-config
  namespace: syroce
data:
  REDIS_MODE: "standalone"
  EVENT_BUS_MODE: "redis"
  MESSAGING_MODE: "production"
  OTEL_SERVICE_NAME: "syroce-pms"
  OTEL_EXPORTER_ENDPOINT: "http://otel-collector:4317"
  BACKUP_ENABLED: "true"
  BACKUP_CRON: "0 2 * * *"
  BACKUP_RETENTION_DAYS: "30"
  BACKUP_PATH: "/data/backups"
  SCALING_MODE: "multi"
  SENTRY_ENVIRONMENT: "production"
---
apiVersion: v1
kind: Secret
metadata:
  name: syroce-secrets
  namespace: syroce
type: Opaque
stringData:
  MONGO_URL: "${MONGO_URL}"
  DB_NAME: "${DB_NAME}"
  JWT_SECRET: "${JWT_SECRET}"
  REDIS_URL: "${REDIS_URL}"
  CORS_ORIGINS: "${CORS_ORIGINS}"
  SENTRY_DSN: "${SENTRY_DSN}"
  TWILIO_ACCOUNT_SID: "${TWILIO_ACCOUNT_SID}"
  TWILIO_AUTH_TOKEN: "${TWILIO_AUTH_TOKEN}"
  TWILIO_FROM_NUMBER: "${TWILIO_FROM_NUMBER}"
  SENDGRID_API_KEY: "${SENDGRID_API_KEY}"
  SENDGRID_FROM_EMAIL: "${SENDGRID_FROM_EMAIL}"
  WHATSAPP_PROVIDER_KEY: "${WHATSAPP_PROVIDER_KEY}"
  SLACK_WEBHOOK_URL: "${SLACK_WEBHOOK_URL}"
  PAGERDUTY_WEBHOOK_URL: "${PAGERDUTY_WEBHOOK_URL}"
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: syroce-ingress
  namespace: syroce
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/rate-limit-connections: "50"
    nginx.ingress.kubernetes.io/rate-limit-rps: "60"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - pms.syroce.com
      secretName: syroce-tls
  rules:
    - host: pms.syroce.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: syroce-backend
                port:
                  number: 8001
          - path: /socket.io
            pathType: Prefix
            backend:
              service:
                name: syroce-backend
                port:
                  number: 8001
          - path: /
            pathType: Prefix
            backend:
              service:
                name: syroce-frontend
                port:
                  number: 3000
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: syroce-backup-pvc
  namespace: syroce
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 50Gi
  storageClassName: standard
