apiVersion: apps/v1
kind: Deployment
metadata:
  name: syroce-frontend
  namespace: syroce
  labels:
    app: syroce
    component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: syroce
      component: frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: syroce
        component: frontend
    spec:
      terminationGracePeriodSeconds: 15
      containers:
        - name: frontend
          image: ${REGISTRY}/syroce-frontend:${IMAGE_TAG}
          ports:
            - containerPort: 3000
              name: http
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          lifecycle:
            preStop:
              exec:
                command: ["sleep", "3"]
---
apiVersion: v1
kind: Service
metadata:
  name: syroce-frontend
  namespace: syroce
spec:
  selector:
    app: syroce
    component: frontend
  ports:
    - port: 3000
      targetPort: 3000
      name: http
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: syroce-frontend-hpa
  namespace: syroce
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: syroce-frontend
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
