apiVersion: v1
kind: Secret
metadata:
  name: eas-webhook-relay-secrets
  namespace: syroce
type: Opaque
stringData:
  EAS_WEBHOOK_SECRET: "${EAS_WEBHOOK_SECRET}"
  GITHUB_TOKEN: "${EAS_RELAY_GITHUB_TOKEN}"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: eas-webhook-relay-config
  namespace: syroce
data:
  GITHUB_REPO: "${EAS_RELAY_GITHUB_REPO}"
  GITHUB_DEFAULT_PROFILE: "preview"
  WEBHOOK_PATH: "/eas"
  PORT: "8080"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: eas-webhook-relay
  namespace: syroce
  labels:
    app: syroce
    component: eas-webhook-relay
spec:
  replicas: 1
  selector:
    matchLabels:
      app: syroce
      component: eas-webhook-relay
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: syroce
        component: eas-webhook-relay
    spec:
      terminationGracePeriodSeconds: 15
      containers:
        - name: relay
          image: ${REGISTRY}/eas-webhook-relay:${IMAGE_TAG}
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - secretRef:
                name: eas-webhook-relay-secrets
            - configMapRef:
                name: eas-webhook-relay-config
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 10
            timeoutSeconds: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
---
apiVersion: v1
kind: Service
metadata:
  name: eas-webhook-relay
  namespace: syroce
spec:
  selector:
    app: syroce
    component: eas-webhook-relay
  ports:
    - name: http
      port: 80
      targetPort: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: eas-webhook-relay
  namespace: syroce
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "1m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "30"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - eas-relay.syroce.com
      secretName: eas-relay-tls
  rules:
    - host: eas-relay.syroce.com
      http:
        paths:
          - path: /eas
            pathType: Exact
            backend:
              service:
                name: eas-webhook-relay
                port:
                  number: 80
          - path: /health
            pathType: Exact
            backend:
              service:
                name: eas-webhook-relay
                port:
                  number: 80
