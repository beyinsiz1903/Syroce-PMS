# Production Nginx Load Balancer — Rate limiting, caching, security, TLS
# Syroce Hotel PMS

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/s;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=ws_limit:10m rate=5r/s;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# Cache
proxy_cache_path /var/cache/nginx/api_cache levels=1:2 keys_zone=api_cache:10m max_size=100m inactive=10m;

upstream backend_pool {
    least_conn;
    server backend:8001 max_fails=3 fail_timeout=15s;
    keepalive 32;
}

upstream frontend_pool {
    server frontend:3000 max_fails=3 fail_timeout=10s;
    keepalive 16;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name _;

    location /health {
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Main HTTPS server
server {
    listen 443 ssl http2;
    server_name _;

    # TLS Configuration
    ssl_certificate /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    # Request limits
    client_max_body_size 50M;
    client_body_buffer_size 128k;
    client_header_buffer_size 4k;
    large_client_header_buffers 4 16k;
    limit_conn conn_limit 50;

    # Proxy defaults
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-ID $request_id;
    proxy_set_header Connection "";

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data: https:; connect-src 'self' wss: https:;" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self)" always;
    add_header X-Request-ID $request_id always;

    # Auth endpoints — strict rate limit
    location ~ ^/api/auth/(login|register) {
        limit_req zone=auth_limit burst=5 nodelay;
        proxy_pass http://backend_pool;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    # Health/metrics — no rate limit, no auth
    location ~ ^/api/(health|metrics) {
        proxy_pass http://backend_pool;
        proxy_read_timeout 10s;
        proxy_connect_timeout 3s;
    }

    # Cacheable API read endpoints
    location ~ ^/api/(rooms|rates|channel-connections)/$ {
        limit_req zone=api_limit burst=30 nodelay;
        proxy_pass http://backend_pool;
        proxy_cache api_cache;
        proxy_cache_valid 200 5m;
        proxy_cache_use_stale error timeout updating;
        proxy_cache_key $request_uri$http_authorization;
        add_header X-Cache-Status $upstream_cache_status;
        proxy_read_timeout 30s;
    }

    # General API
    location /api/ {
        limit_req zone=api_limit burst=30 nodelay;
        proxy_pass http://backend_pool/api/;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 16k;
    }

    # WebSocket
    location /socket.io/ {
        limit_req zone=ws_limit burst=10 nodelay;
        proxy_pass http://backend_pool/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Frontend static assets — aggressive caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://frontend_pool;
        proxy_cache api_cache;
        proxy_cache_valid 200 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        add_header X-Cache-Status $upstream_cache_status;
    }

    # Frontend
    location / {
        proxy_pass http://frontend_pool;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Block sensitive paths
    location ~ /\.(git|env|docker) {
        deny all;
        return 404;
    }
}
