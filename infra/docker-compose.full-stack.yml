# Production Full-Stack Docker Compose
# Includes: Backend, Frontend, Workers, Redis, Nginx, Prometheus, Grafana, OTel Collector, Alertmanager
version: "3.9"

x-backend-env: &backend-env
  MONGO_URL: ${MONGO_URL}
  DB_NAME: ${DB_NAME}
  REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
  REDIS_MODE: ${REDIS_MODE:-standalone}
  EVENT_BUS_MODE: redis
  MESSAGING_MODE: ${MESSAGING_MODE:-sandbox}
  SECRETS_PROVIDER: ${SECRETS_PROVIDER:-env}
  SENTRY_DSN: ${SENTRY_DSN:-}
  OTEL_EXPORTER_ENDPOINT: ${OTEL_EXPORTER_ENDPOINT:-http://otel-collector:4317}
  OTEL_SERVICE_NAME: syroce-pms
  BACKUP_ENABLED: "true"
  BACKUP_CRON: "0 2 * * *"
  BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-30}
  BACKUP_PATH: /data/backups
  JWT_SECRET: ${JWT_SECRET}
  CORS_ORIGINS: ${CORS_ORIGINS}
  TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
  TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
  TWILIO_FROM_NUMBER: ${TWILIO_FROM_NUMBER:-}
  SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
  SENDGRID_FROM_EMAIL: ${SENDGRID_FROM_EMAIL:-}
  WHATSAPP_PROVIDER_KEY: ${WHATSAPP_PROVIDER_KEY:-}
  OPS_WEBHOOK_URL: ${OPS_WEBHOOK_URL:-}
  SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
  PAGERDUTY_WEBHOOK_URL: ${PAGERDUTY_WEBHOOK_URL:-}
  SENTRY_ENVIRONMENT: production

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "5"
    tag: "{{.Name}}"

x-healthcheck-defaults: &healthcheck-defaults
  interval: 15s
  timeout: 5s
  retries: 3
  start_period: 20s

networks:
  syroce-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  redis-data:
  mongo-data:
  backup-data:
  grafana-data:
  prometheus-data:

services:
  # ── Redis (Production) ──
  redis:
    image: redis:7.2-alpine
    restart: always
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
      --tcp-backlog 511
      --timeout 300
      --tcp-keepalive 60
      --save 900 1
      --save 300 10
      --save 60 10000
      --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redis-data:/data
    networks:
      - syroce-net
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 768M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      <<: *healthcheck-defaults
    logging: *default-logging

  # ── Backend API (Scalable) ──
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: always
    environment:
      <<: *backend-env
      INSTANCE_ID: backend-${HOSTNAME:-1}
      SCALING_MODE: multi
    env_file:
      - ../backend/.env
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - backup-data:/data/backups
    networks:
      - syroce-net
    deploy:
      replicas: ${BACKEND_REPLICAS:-2}
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/health/liveness"]
      <<: *healthcheck-defaults
    logging: *default-logging

  # ── Frontend (Scalable) ──
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        VITE_BACKEND_URL: ${VITE_BACKEND_URL}
    restart: always
    networks:
      - syroce-net
    deploy:
      replicas: ${FRONTEND_REPLICAS:-2}
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging: *default-logging

  # ── Celery Worker (Scalable) ──
  worker:
    build:
      context: ..
      dockerfile: ./worker/Dockerfile
    restart: always
    environment:
      <<: *backend-env
      INSTANCE_ID: worker-${HOSTNAME:-1}
    env_file:
      - ../backend/.env
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - backup-data:/data/backups
    networks:
      - syroce-net
    deploy:
      replicas: ${WORKER_REPLICAS:-2}
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.25"
          memory: 256M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
    healthcheck:
      test: ["CMD", "celery", "-A", "celery_app", "inspect", "ping", "--timeout", "5"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging: *default-logging

  # ── Celery Beat ──
  beat:
    build:
      context: ..
      dockerfile: ./worker/Dockerfile
    restart: always
    environment:
      <<: *backend-env
    env_file:
      - ../backend/.env
    depends_on:
      redis:
        condition: service_healthy
    command: ["celery", "-A", "celery_app", "beat", "--loglevel=info", "--pidfile=/tmp/celerybeat.pid"]
    networks:
      - syroce-net
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
    logging: *default-logging

  # ── Nginx Load Balancer ──
  nginx:
    image: nginx:1.25-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    networks:
      - syroce-net
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      <<: *healthcheck-defaults
    logging: *default-logging

  # ── OpenTelemetry Collector ──
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.96.0
    restart: always
    volumes:
      - ./otel/otel-collector.yml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4317:4317"   # gRPC OTLP
      - "4318:4318"   # HTTP OTLP
      - "8889:8889"   # Prometheus metrics
    networks:
      - syroce-net
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    logging: *default-logging

  # ── Prometheus ──
  prometheus:
    image: prom/prometheus:v2.51.0
    restart: always
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    networks:
      - syroce-net
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 1G
    logging: *default-logging

  # ── Grafana ──
  grafana:
    image: grafana/grafana:10.3.3
    restart: always
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-syroce-ops-2026}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost:3001}
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/operations.json
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3001:3000"
    networks:
      - syroce-net
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    logging: *default-logging

  # ── Alertmanager ──
  alertmanager:
    image: prom/alertmanager:v0.27.0
    restart: always
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    ports:
      - "9093:9093"
    networks:
      - syroce-net
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
    logging: *default-logging
