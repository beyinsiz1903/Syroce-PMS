# ── Development Docker Compose ─────────────────────────────────────
# Full local stack: backend, frontend, worker, redis, mongo
version: "3.9"

x-backend-env: &backend-env
  MONGO_URL: mongodb://mongo:27017/hotel_pms
  DB_NAME: hotel_pms
  REDIS_URL: redis://redis:6379/0
  REDIS_MODE: standalone
  EVENT_BUS_MODE: redis
  MESSAGING_MODE: sandbox
  SECRETS_PROVIDER: env
  SENTRY_DSN: ""
  OTEL_EXPORTER_ENDPOINT: ""
  BACKUP_ENABLED: "true"
  BACKUP_CRON: "0 2 * * *"
  INSTANCE_ID: dev-1
  CORS_ORIGINS: http://localhost:3000

services:
  # ── MongoDB ──
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - mongo_config:/data/configdb
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 1G

  # ── Redis ──
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --save 60 1000
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  # ── Backend API ──
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      <<: *backend-env
    env_file:
      - ./backend/.env
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - backend_ml_models:/app/ml_models
    command: ["uvicorn", "server:app", "--host", "0.0.0.0", "--port", "8001", "--reload"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/health/liveness"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── Frontend ──
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      VITE_BACKEND_URL: http://localhost:8001
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    command: ["yarn", "start"]

  # ── Celery Worker ──
  worker:
    build:
      context: .
      dockerfile: ./worker/Dockerfile
    restart: unless-stopped
    environment:
      <<: *backend-env
    env_file:
      - ./backend/.env
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    healthcheck:
      test: ["CMD", "celery", "-A", "celery_app", "inspect", "ping", "--timeout", "5"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Celery Beat (Scheduler) ──
  beat:
    build:
      context: .
      dockerfile: ./worker/Dockerfile
    restart: unless-stopped
    environment:
      <<: *backend-env
    env_file:
      - ./backend/.env
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: ["celery", "-A", "celery_app", "beat", "--loglevel=info"]

volumes:
  mongo_data:
  mongo_config:
  redis_data:
  backend_ml_models:
