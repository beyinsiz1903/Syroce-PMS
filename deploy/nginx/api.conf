limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/s;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=webhook_limit:10m rate=30r/s;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

upstream backend_pool {
    least_conn;
    server backend:8001 max_fails=3 fail_timeout=15s;
    keepalive 32;
}

server {
    listen 80;
    server_name api.syroce.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location /health {
        return 200 '{"status":"ok","service":"syroce-pms-gateway"}';
        add_header Content-Type application/json;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name api.syroce.com;

    ssl_certificate /etc/letsencrypt/live/api.syroce.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.syroce.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    client_max_body_size 50M;
    client_body_buffer_size 128k;
    limit_conn conn_limit 50;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-ID $request_id;
    proxy_set_header Connection "";

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Request-ID $request_id always;

    location ~ ^/api/auth/(login|register) {
        limit_req zone=auth_limit burst=5 nodelay;
        proxy_pass http://backend_pool;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    location ~ ^/api/(health|metrics) {
        proxy_pass http://backend_pool;
        proxy_read_timeout 10s;
        proxy_connect_timeout 3s;
    }

    location = /api/integrations/hotelrunner/callback {
        limit_req zone=webhook_limit burst=10 nodelay;
        proxy_pass http://backend_pool;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    location = /api/integrations/hotelrunner/webhook {
        limit_req zone=webhook_limit burst=20 nodelay;
        proxy_pass http://backend_pool;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
    }

    location /api/ {
        limit_req zone=api_limit burst=30 nodelay;
        proxy_pass http://backend_pool/api/;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 16k;
    }

    location /socket.io/ {
        proxy_pass http://backend_pool/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    location / {
        return 404 '{"error":"not_found","message":"Bu sunucu sadece API servisi sunar. Frontend: https://pms.syroce.com"}';
        add_header Content-Type application/json;
    }

    location ~ /\.(git|env|docker) {
        deny all;
        return 404;
    }
}
