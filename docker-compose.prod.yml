# ── Production Docker Compose ──────────────────────────────────────
# Optimized for production deployment
version: "3.9"

x-backend-env: &backend-env
  MONGO_URL: ${MONGO_URL}
  DB_NAME: ${DB_NAME}
  REDIS_URL: ${REDIS_URL}
  REDIS_MODE: ${REDIS_MODE:-standalone}
  EVENT_BUS_MODE: redis
  MESSAGING_MODE: ${MESSAGING_MODE:-sandbox}
  SECRETS_PROVIDER: ${SECRETS_PROVIDER:-env}
  SENTRY_DSN: ${SENTRY_DSN}
  OTEL_EXPORTER_ENDPOINT: ${OTEL_EXPORTER_ENDPOINT}
  BACKUP_ENABLED: "true"
  BACKUP_CRON: "0 2 * * *"
  JWT_SECRET: ${JWT_SECRET}
  CORS_ORIGINS: ${CORS_ORIGINS}
  JWT_EXPIRATION_MINUTES: "60"

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "5"
    tag: "{{.Name}}"

services:
  # ── Backend API (scalable) ──
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    environment:
      <<: *backend-env
      INSTANCE_ID: backend-${HOSTNAME:-1}
    env_file:
      - ./backend/.env
    deploy:
      replicas: ${BACKEND_REPLICAS:-2}
      update_config:
        order: start-first
        parallelism: 1
        delay: 10s
        failure_action: rollback
        monitor: 30s
      rollback_config:
        order: stop-first
        parallelism: 1
        delay: 5s
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/health/liveness"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging: *default-logging

  # ── Frontend (scalable) ──
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_BACKEND_URL: ${VITE_BACKEND_URL}
    restart: always
    deploy:
      replicas: ${FRONTEND_REPLICAS:-2}
      update_config:
        order: start-first
        parallelism: 1
        delay: 10s
        failure_action: rollback
        monitor: 30s
      rollback_config:
        order: stop-first
        parallelism: 1
        delay: 5s
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging: *default-logging

  # ── Celery Worker (scalable) ──
  worker:
    build:
      context: .
      dockerfile: ./worker/Dockerfile
    restart: always
    environment:
      <<: *backend-env
      INSTANCE_ID: worker-${HOSTNAME:-1}
    env_file:
      - ./backend/.env
    deploy:
      replicas: ${WORKER_REPLICAS:-2}
      update_config:
        order: start-first
        parallelism: 1
        delay: 10s
        failure_action: rollback
        monitor: 30s
      rollback_config:
        order: stop-first
        parallelism: 1
        delay: 5s
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.25"
          memory: 256M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
    healthcheck:
      test: ["CMD", "celery", "-A", "celery_app", "inspect", "ping", "--timeout", "5"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging: *default-logging

  # ── Celery Beat ──
  beat:
    build:
      context: .
      dockerfile: ./worker/Dockerfile
    restart: always
    environment:
      <<: *backend-env
    env_file:
      - ./backend/.env
    command: ["celery", "-A", "celery_app", "beat", "--loglevel=info", "--pidfile=/tmp/celerybeat.pid"]
    deploy:
      replicas: 1
      update_config:
        order: stop-first
        parallelism: 1
        delay: 5s
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
    logging: *default-logging

  # ── Load Balancer ──
  nginx:
    image: nginx:1.25-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./infra/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    logging: *default-logging
