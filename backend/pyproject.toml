[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "session"
asyncio_default_test_loop_scope = "session"
norecursedirs = ["tests/_quarantine"]
markers = [
    "live_server: requires a running server or live external service",
    "chaos_l1: level 1 chaos and resilience tests",
    "chaos_l2: level 2 destructive or advanced chaos tests",
    "unit: isolated tests without real external infrastructure",
    "integration: tests combining multiple application components",
    "e2e: end-to-end tests covering complete application flows",
    "infra: tests depending on database, Redis, workers, schedulers, or infrastructure state",
    "slow: tests classified as slow using measured runtime evidence",
    "ci_load: Fast load tests safe for CI (every PR)",
    "chaos_l3: Level 3 end-to-end chaos flows (weekly)",
    "chaos_l4: Level 4 soak/burst tests (weekly/pre-pilot)",
    "chaos_crypto: Crypto-specific resilience tests",
    "chaos_tenant: Multi-tenant safety tests",
    "chaos_provider: Provider failure tests",
    "chaos_outbox: Outbox/worker resilience tests",
    "live_mongo: Tests that require a reachable real MongoDB; when REQUIRE_LIVE_MONGO=1 these must actually run (no skip-as-pass)",
]

[tool.ruff]
target-version = "py311"
line-length = 200
exclude = [
    "_legacy/",
    "create_*.py",
    "seed_*.py",
    "fix_*.py",
    "load_tests/",
    "tests/",
]

[tool.ruff.lint]
select = ["E9", "F63", "F7", "F82", "F401", "F811", "F841", "I", "W", "C4", "UP006", "UP012", "UP015", "UP017", "UP024", "UP034", "UP041", "UP045"]
ignore = ["F821"]

[tool.ruff.lint.isort]
known-first-party = ["core", "common", "domains", "infra", "modules", "controlplane", "security", "shared_kernel", "workers", "ops", "channel_manager", "routers", "bootstrap", "models"]
section-order = ["future", "standard-library", "third-party", "first-party", "local-folder"]
