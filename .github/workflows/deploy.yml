name: Deploy Pipeline (Manual)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Deploy target"
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/syroce

jobs:
  # ── Build & Push Images ────────────────────────────────────────
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:latest

      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          build-args: |
            VITE_BACKEND_URL=${{ secrets.VITE_BACKEND_URL }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:latest

      - name: Build & Push Worker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./worker/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-worker:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-worker:latest

  # ── Deploy to Staging ──────────────────────────────────────────
  deploy-staging:
    if: ${{ github.event.inputs.environment == 'staging' }}
    needs: build-push
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Staging
        run: |
          if [ -z "${{ secrets.KUBECONFIG }}" ]; then
            echo "::warning::Staging deployment skipped — KUBECONFIG not configured in GitHub Secrets"
            echo "SHA: ${{ github.sha }}"
            exit 0
          fi
          echo "Deploying to staging..."
          echo "${{ secrets.KUBECONFIG }}" > /tmp/kubeconfig
          export KUBECONFIG=/tmp/kubeconfig
          kubectl set image deployment/backend backend=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:${{ github.sha }}
          kubectl set image deployment/frontend frontend=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:${{ github.sha }}
          kubectl set image deployment/worker worker=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-worker:${{ github.sha }}
          rm -f /tmp/kubeconfig

      - name: Verify Staging Health
        if: success()
        run: |
          if [ -z "${{ secrets.STAGING_URL }}" ]; then
            echo "::warning::Staging health check skipped — STAGING_URL not configured"
            exit 0
          fi
          curl -f ${{ secrets.STAGING_URL }}/api/health/

  # ── Deploy to Production ───────────────────────────────────────
  deploy-production:
    if: ${{ github.event.inputs.environment == 'production' }}
    needs: build-push
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Create DB Backup
        run: |
          if [ -z "${{ secrets.MONGO_BACKUP_URI }}" ]; then
            echo "::warning::DB backup skipped — MONGO_BACKUP_URI not configured in GitHub Secrets"
            echo "SHA: ${{ github.sha }}"
            exit 0
          fi
          echo "Creating pre-deploy backup..."
          mongodump --uri="${{ secrets.MONGO_BACKUP_URI }}" --archive=/tmp/pre-deploy-${{ github.sha }}.gz --gzip
          echo "Backup created: pre-deploy-${{ github.sha }}.gz"

      - name: Deploy to Production
        run: |
          if [ -z "${{ secrets.KUBECONFIG }}" ]; then
            echo "::warning::Production deployment skipped — KUBECONFIG not configured in GitHub Secrets"
            echo "SHA: ${{ github.sha }}"
            exit 0
          fi
          echo "Deploying to production..."
          echo "${{ secrets.KUBECONFIG }}" > /tmp/kubeconfig
          export KUBECONFIG=/tmp/kubeconfig
          kubectl set image deployment/backend backend=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:${{ github.sha }}
          kubectl set image deployment/frontend frontend=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:${{ github.sha }}
          kubectl set image deployment/worker worker=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-worker:${{ github.sha }}
          rm -f /tmp/kubeconfig

      - name: Verify Production Health
        if: success()
        run: |
          if [ -z "${{ secrets.PRODUCTION_URL }}" ]; then
            echo "::warning::Production health check skipped — PRODUCTION_URL not configured"
            exit 0
          fi
          curl -f ${{ secrets.PRODUCTION_URL }}/api/health/

      - name: Notify
        if: always()
        run: |
          echo "Deploy status: ${{ job.status }}"
          echo "SHA: ${{ github.sha }}"
          echo "Environment: ${{ github.event.inputs.environment }}"
