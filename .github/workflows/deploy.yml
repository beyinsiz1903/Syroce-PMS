name: Deploy Pipeline (Manual)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Deploy target"
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/syroce

jobs:
  # ── Build & Push Images ────────────────────────────────────────
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:latest

      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          build-args: |
            REACT_APP_BACKEND_URL=${{ secrets.REACT_APP_BACKEND_URL }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:latest

      - name: Build & Push Worker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./worker/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-worker:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-worker:latest

  # ── Deploy to Staging ──────────────────────────────────────────
  deploy-staging:
    if: ${{ github.event.inputs.environment == 'staging' }}
    needs: build-push
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Staging
        run: |
          echo "TODO: Configure kubectl or deployment mechanism"
          echo "Image tag: ${{ github.sha }}"
          exit 1
        # kubectl set image deployment/backend backend=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:${{ github.sha }}
        # kubectl set image deployment/frontend frontend=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:${{ github.sha }}
        # kubectl set image deployment/worker worker=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-worker:${{ github.sha }}

      - name: Verify Staging Health
        if: success()
        run: |
          echo "TODO: Configure staging health check"
          # curl -f https://staging.syroce.com/api/health/

  # ── Deploy to Production ───────────────────────────────────────
  deploy-production:
    if: ${{ github.event.inputs.environment == 'production' }}
    needs: build-push
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Create DB Backup
        run: |
          echo "TODO: Configure pre-deploy backup mechanism"
          exit 1

      - name: Deploy to Production
        run: |
          echo "TODO: Configure production deployment"
          echo "Image tag: ${{ github.sha }}"
          exit 1

      - name: Verify Production Health
        if: success()
        run: |
          echo "TODO: Configure production health check"
          # curl -f https://app.syroce.com/api/health/

      - name: Notify
        if: always()
        run: |
          echo "Deploy status: ${{ job.status }}"
          echo "SHA: ${{ github.sha }}"
          echo "Environment: ${{ github.event.inputs.environment }}"
