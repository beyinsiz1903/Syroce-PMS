name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  # ── Backend Lint & Test ────────────────────────────────────────
  backend-test:
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7
        ports: ["27017:27017"]
        options: --health-cmd "mongosh --eval 'db.adminCommand(\"ping\")'" --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install ruff pytest pytest-asyncio

      - name: Lint
        run: cd backend && ruff check . --output-format=github

      - name: Unit Tests
        env:
          MONGO_URL: mongodb://localhost:27017/hotel_pms_test
          DB_NAME: hotel_pms_test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: test-secret-key
        run: cd backend && python -m pytest tests/ -v --tb=short -x

  # ── Frontend Lint & Test ───────────────────────────────────────
  frontend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn
          cache-dependency-path: frontend/yarn.lock

      - name: Install
        run: cd frontend && yarn install --ignore-engines

      - name: Lint
        run: cd frontend && npx eslint src/ --max-warnings=0 || true

      - name: Test
        run: cd frontend && yarn test --watchAll=false --passWithNoTests
        env:
          CI: true

  # ── Container Build ────────────────────────────────────────────
  container-build:
    needs: [backend-test, frontend-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Backend Image
        run: docker build -t syroce-backend:${{ github.sha }} ./backend

      - name: Build Frontend Image
        run: docker build -t syroce-frontend:${{ github.sha }} --build-arg REACT_APP_BACKEND_URL=https://api.syroce.com ./frontend

      - name: Build Worker Image
        run: docker build -t syroce-worker:${{ github.sha }} -f ./worker/Dockerfile .

  # ── Security Scan ──────────────────────────────────────────────
  security-scan:
    needs: [backend-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python Security Audit
        run: |
          pip install pip-audit safety
          cd backend && pip-audit -r requirements.txt || true

      - name: Trivy Container Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: 0
