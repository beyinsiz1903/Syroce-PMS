name: Full Stress Suite (one-shot)

# Task #163 + #192 review fix — TÜM stress suite'ini (`yarn test:e2e:stress`)
# split/shard yapısında çalıştırır: setup (seed) -> parallel matrix shards -> teardown (cleanup).
#
# Kapsam:
#   - Shard B (Front Office Core): Specs 00..09, 95, 99 — Reservation, room move, folio, night audit.
#   - Shard C (Operations & Service): Specs 08, 08B, 10..13, 98-maintenance, 98-messaging — Housekeeping, complaints, messaging.
#   - Shard D (MICE & Sales & HR & Finance): Specs 14..29, 32..35B, 37..39B, 70..72, 98-pos*, 98-rms*, 99-pos* — MICE, HR, Finance.
#   - Shard E (Security & Integrations): Specs 30, 31, 36, 40..45, 50..52B, 60..66, 96, 97, 98-auth*, 98-vcc*, 98B*, 98C*, 98D* — Security, cross-tenant isolation, CM.

on:
    schedule:
        - cron: '30 2 * * *'
    workflow_dispatch:
        inputs:
            report_tag:
                description: 'STRESS_REPORT_TAG (drill report filename suffix). Default: full_stress_suite'
                required: false
                default: 'full_stress_suite'
            room_count:
                description: 'E2E_ROOM_COUNT (seed size). Default: 500'
                required: false
                default: '500'
            spec_pattern:
                description: 'Optional Playwright spec filter (relative to e2e-stress/, e.g. `specs/99-finance-folio-surface.spec.js`). Empty = full suite.'
                required: false
                default: ''

concurrency:
    group: stress-suite-one-shot
    cancel-in-progress: false

env:
    NODE_VERSION: '22'
    # Global environment vars for all jobs
    E2E_BASE_URL: ${{ secrets.STRESS_E2E_BASE_URL }}
    E2E_FE_BASE_URL: ${{ secrets.STRESS_FE_BASE_URL }}
    E2E_ADMIN_EMAIL: ${{ secrets.STRESS_PILOT_ADMIN_EMAIL }}
    E2E_ADMIN_PASSWORD: ${{ secrets.STRESS_PILOT_ADMIN_PASSWORD }}
    E2E_STRESS_ADMIN_EMAIL: ${{ secrets.STRESS_TENANT_ADMIN_EMAIL }}
    E2E_STRESS_ADMIN_PASSWORD: ${{ secrets.STRESS_TENANT_ADMIN_PASSWORD }}
    E2E_STRESS_TENANT_ID: ${{ secrets.STRESS_TENANT_ID }}
    PILOT_TENANT_ID: ${{ secrets.PILOT_TENANT_ID }}
    E2E_ALLOW_DESTRUCTIVE_STRESS: 'true'
    E2E_EXTERNAL_DRY_RUN: 'true'
    HOTELRUNNER_WEBHOOK_SECRET: ${{ secrets.STRESS_HOTELRUNNER_WEBHOOK_SECRET }}
    E2E_ROOM_COUNT: ${{ github.event.inputs.room_count || '500' }}
    CI: 'true'
    DISABLE_EXPO_PUSH: '1'
    SLACK_WEBHOOK_URL: ${{ secrets.STRESS_SLACK_WEBHOOK_URL }}

jobs:
    setup:
        name: Stress Setup & Seed
        runs-on: ubuntu-latest
        timeout-minutes: 20
        steps:
            - uses: actions/checkout@v4

            - name: Pre-flight — required secrets + base URL health
              id: preflight
              run: |
                  set -euo pipefail
                  missing=()
                  for v in E2E_BASE_URL E2E_ADMIN_EMAIL E2E_ADMIN_PASSWORD \
                           E2E_STRESS_ADMIN_EMAIL E2E_STRESS_ADMIN_PASSWORD \
                           E2E_STRESS_TENANT_ID PILOT_TENANT_ID; do
                      if [ -z "${!v}" ]; then missing+=("$v"); fi
                  done
                  if [ ${#missing[@]} -ne 0 ]; then
                      echo "::error::Missing required secrets: ${missing[*]}"
                      exit 1
                  fi
                  if [ "$E2E_STRESS_TENANT_ID" = "$PILOT_TENANT_ID" ]; then
                      echo "::error::E2E_STRESS_TENANT_ID == PILOT_TENANT_ID — fail-closed."
                      exit 1
                  fi
                  if ! echo "$E2E_BASE_URL" | grep -qE '^https?://[^[:space:]]+'; then
                      echo "::error::E2E_BASE_URL formatı geçersiz: '$E2E_BASE_URL'"
                      exit 1
                  fi
                  reachable=0
                  for attempt in $(seq 1 30); do
                      code=$(curl -sS -o /dev/null -w '%{http_code}' \
                          --max-time 10 "${E2E_BASE_URL%/}/health" || echo "000")
                      if [ "$code" != "000" ] && [ "$code" -lt 500 ]; then
                          reachable=1
                          echo "✓ Health check OK (HTTP $code, attempt $attempt)"
                          break
                      fi
                      echo "Health check attempt $attempt: HTTP $code"
                      sleep 5
                  done
                  if [ "$reachable" -eq 0 ]; then
                      echo "::error::E2E_BASE_URL erişilemez"
                      exit 1
                  fi
                  echo "✓ Pre-flight gates OK"

            - name: Set up Node.js
              uses: actions/setup-node@v5
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: 'yarn'
                  cache-dependency-path: frontend/yarn.lock

            - name: Install frontend deps
              run: cd frontend && yarn install --ignore-engines --frozen-lockfile

            - name: Install Playwright browsers
              run: |
                  sudo find /etc/apt/sources.list.d -type f \( -name '*.list' -o -name '*.sources' \) \
                      -exec grep -lE 'packages\.microsoft\.com' {} + 2>/dev/null | xargs -r sudo rm -f || true
                  cd frontend && yarn e2e:install

            - name: Validate stress frontend origin
              working-directory: frontend
              env:
                  E2E_FE_BASE_URL: ${{ secrets.STRESS_FE_BASE_URL }}
              run: |
                  python3 - <<'PY'
                  import os
                  from urllib.parse import urlsplit

                  value = os.environ.get("E2E_FE_BASE_URL", "")
                  parsed = urlsplit(value.strip())

                  print("defined:", bool(value))
                  print("exact_expected:", value == "https://pms.syroce.com")
                  print("has_outer_whitespace:", value != value.strip())
                  print("has_trailing_slash:", value.endswith("/"))
                  print("scheme_https:", parsed.scheme == "https")
                  print("host_matches:", parsed.hostname == "pms.syroce.com")
                  print("port_absent:", parsed.port is None)
                  print("path_empty:", parsed.path == "")
                  print("query_empty:", parsed.query == "")
                  print("fragment_empty:", parsed.fragment == "")
                  PY

            - name: Run Gates and Database Seed
              env:
                  STRESS_SKIP_TEARDOWN: 'true'
              run: |
                  cd frontend
                  yarn playwright test --config=playwright.stress.config.js e2e-stress/specs/00-gates.spec.js e2e-stress/specs/01-bulk-seed-500.spec.js

            - name: Upload Auth State
              uses: actions/upload-artifact@v5
              with:
                  name: stress-auth
                  path: frontend/e2e-stress/.auth/
                  include-hidden-files: true
                  retention-days: 1

    stress:
        name: Shard ${{ matrix.shard }} - ${{ matrix.name }}
        needs: setup
        runs-on: ubuntu-latest
        timeout-minutes: 45
        strategy:
            fail-fast: false
            matrix:
                shard: [B, C, D, E]
                include:
                    - shard: B
                      name: "Front Office Core"
                      spec_pattern: "e2e-stress/specs/02-*.spec.js e2e-stress/specs/03-*.spec.js e2e-stress/specs/04-*.spec.js e2e-stress/specs/05-*.spec.js e2e-stress/specs/06-*.spec.js e2e-stress/specs/09-*.spec.js e2e-stress/specs/95-*.spec.js e2e-stress/specs/99-*.spec.js e2e-stress/specs/99B-*.spec.js"
                      report_tag: "shard_b_front_office"
                    - shard: C
                      name: "Operations & Service"
                      spec_pattern: "e2e-stress/specs/08-*.spec.js e2e-stress/specs/08B-*.spec.js e2e-stress/specs/10-*.spec.js e2e-stress/specs/11-*.spec.js e2e-stress/specs/12-*.spec.js e2e-stress/specs/13-*.spec.js e2e-stress/specs/98-maintenance-workorder-lifecycle.spec.js e2e-stress/specs/98-messaging-template-lifecycle.spec.js"
                      report_tag: "shard_c_operations"
                    - shard: D
                      name: "MICE & Sales & HR & Finance"
                      spec_pattern: "e2e-stress/specs/14-*.spec.js e2e-stress/specs/15-*.spec.js e2e-stress/specs/16-*.spec.js e2e-stress/specs/17-*.spec.js e2e-stress/specs/18-*.spec.js e2e-stress/specs/19-*.spec.js e2e-stress/specs/20-*.spec.js e2e-stress/specs/21-*.spec.js e2e-stress/specs/22-*.spec.js e2e-stress/specs/23-*.spec.js e2e-stress/specs/24-*.spec.js e2e-stress/specs/25-*.spec.js e2e-stress/specs/26-*.spec.js e2e-stress/specs/27-*.spec.js e2e-stress/specs/28-*.spec.js e2e-stress/specs/29-*.spec.js e2e-stress/specs/32-*.spec.js e2e-stress/specs/33-*.spec.js e2e-stress/specs/33B-*.spec.js e2e-stress/specs/34-*.spec.js e2e-stress/specs/35-*.spec.js e2e-stress/specs/35B-*.spec.js e2e-stress/specs/37-*.spec.js e2e-stress/specs/38-*.spec.js e2e-stress/specs/38B-*.spec.js e2e-stress/specs/39-*.spec.js e2e-stress/specs/39B-*.spec.js e2e-stress/specs/70-*.spec.js e2e-stress/specs/71-*.spec.js e2e-stress/specs/72-*.spec.js e2e-stress/specs/98-mobile-cashier-surface.spec.js e2e-stress/specs/98-payment-pos-reconciliation-dryrun.spec.js e2e-stress/specs/98-pos-deep-lifecycle.spec.js e2e-stress/specs/98-pos-kds-inventory.spec.js e2e-stress/specs/98-efatura-earsiv-dryrun.spec.js e2e-stress/specs/98-konaklama-vergisi-dryrun.spec.js e2e-stress/specs/98-fnb-beo-generator.spec.js e2e-stress/specs/98-golf-operational.spec.js e2e-stress/specs/98-rms-revenue-deep.spec.js e2e-stress/specs/98-sales-basic-lifecycle.spec.js e2e-stress/specs/98-spa-wellness-operational.spec.js"
                      report_tag: "shard_d_mice_hr_finance"
                    - shard: E
                      name: "Security & Integrations"
                      spec_pattern: "e2e-stress/specs/30-*.spec.js e2e-stress/specs/31-*.spec.js e2e-stress/specs/36-*.spec.js e2e-stress/specs/40-*.spec.js e2e-stress/specs/41-*.spec.js e2e-stress/specs/41B-*.spec.js e2e-stress/specs/42-*.spec.js e2e-stress/specs/43-*.spec.js e2e-stress/specs/44-*.spec.js e2e-stress/specs/45-*.spec.js e2e-stress/specs/50-*.spec.js e2e-stress/specs/51-*.spec.js e2e-stress/specs/52-*.spec.js e2e-stress/specs/52B-*.spec.js e2e-stress/specs/60-*.spec.js e2e-stress/specs/61-*.spec.js e2e-stress/specs/62-*.spec.js e2e-stress/specs/63-*.spec.js e2e-stress/specs/64-*.spec.js e2e-stress/specs/65-*.spec.js e2e-stress/specs/66-*.spec.js e2e-stress/specs/96-*.spec.js e2e-stress/specs/97-*.spec.js e2e-stress/specs/98-auth-token-lifecycle.spec.js e2e-stress/specs/98-vcc-pci-compliance.spec.js e2e-stress/specs/98B-websocket-tenant-isolation.spec.js e2e-stress/specs/98C-twofa-totp-lifecycle.spec.js e2e-stress/specs/98D-peer-login-throttle.spec.js"
                      report_tag: "shard_e_security_integrations"
        env:
            STRESS_SKIP_SETUP: 'true'
            STRESS_SKIP_TEARDOWN: 'true'
            STRESS_REPORT_TAG: ${{ matrix.report_tag }}
            STRESS_REPORT_TITLE: 'Stress Shard ${{ matrix.shard }} — ${{ matrix.name }}'
        steps:
            - uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v5
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: 'yarn'
                  cache-dependency-path: frontend/yarn.lock

            - name: Install frontend deps
              run: cd frontend && yarn install --ignore-engines --frozen-lockfile

            - name: Install Playwright browsers
              run: |
                  sudo find /etc/apt/sources.list.d -type f \( -name '*.list' -o -name '*.sources' \) \
                      -exec grep -lE 'packages\.microsoft\.com' {} + 2>/dev/null | xargs -r sudo rm -f || true
                  cd frontend && yarn e2e:install

            - name: Download Auth State
              uses: actions/download-artifact@v5
              with:
                  name: stress-auth
                  path: frontend/e2e-stress/.auth/

            - name: Run Shard Specs
              run: |
                  cd frontend
                  yarn playwright test --config=playwright.stress.config.js ${{ matrix.spec_pattern }}

            - name: Verify drill report verdict (hard-fail on NO-GO)
              id: verdict_check
              if: always()
              run: |
                  set -euo pipefail
                  report=$(ls -1t docs/drill_reports/*_stress_${{ env.STRESS_REPORT_TAG }}.md 2>/dev/null | head -n1 || true)
                  verdict="UNKNOWN"
                  verdict_line=""
                  if [ -n "$report" ]; then
                      echo "Drill report: $report"
                      verdict_line=$(grep -E '^\| Final verdict \|' "$report" | head -n1 || true)
                      echo "Verdict line: $verdict_line"
                      if echo "$verdict_line" | grep -q 'NO-GO'; then
                          verdict="NO-GO"
                      elif echo "$verdict_line" | grep -q 'GO WITH WATCH'; then
                          verdict="GO WITH WATCH"
                      elif echo "$verdict_line" | grep -qE '\bGO\b'; then
                          verdict="GO"
                      fi
                  fi
                  {
                      echo "verdict=$verdict"
                      echo "report_path=${report:-}"
                      echo "verdict_line<<VERDICT_EOF"
                      echo "${verdict_line}"
                      echo "VERDICT_EOF"
                  } >> "$GITHUB_OUTPUT"
                  if [ -z "$report" ]; then
                      echo "::error::No stress drill report found for tag=${{ env.STRESS_REPORT_TAG }}"
                      exit 1
                  fi
                  if [ "$verdict" = "NO-GO" ]; then
                      echo "::error::Stress verdict is NO-GO — see $report"
                      exit 1
                  fi
                  if [ "$verdict" != "GO" ] && [ "$verdict" != "GO WITH WATCH" ]; then
                      echo "::error::Verdict line missing or unparseable in $report"
                      exit 1
                  fi
                  echo "✓ Verdict gate passed ($verdict)"

            - name: Upload Playwright HTML report
              if: always()
              uses: actions/upload-artifact@v5
              with:
                  name: playwright-stress-report-shard-${{ matrix.shard }}
                  path: frontend/playwright-stress-report/
                  retention-days: 30

            - name: Upload drill report (markdown)
              if: always()
              uses: actions/upload-artifact@v5
              with:
                  name: stress-drill-report-shard-${{ matrix.shard }}
                  path: docs/drill_reports/*_stress_${{ env.STRESS_REPORT_TAG }}.md
                  retention-days: 90
                  if-no-files-found: warn

            - name: Upload traces / videos / screenshots
              if: always()
              uses: actions/upload-artifact@v5
              with:
                  name: stress-test-results-shard-${{ matrix.shard }}
                  path: frontend/test-results-stress/
                  retention-days: 14
                  if-no-files-found: ignore

    teardown:
        name: Stress Teardown & Cleanup
        needs: [setup, stress]
        if: always() && needs.setup.result == 'success'
        runs-on: ubuntu-latest
        timeout-minutes: 20
        steps:
            - uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v5
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: 'yarn'
                  cache-dependency-path: frontend/yarn.lock

            - name: Install frontend deps
              run: cd frontend && yarn install --ignore-engines --frozen-lockfile

            - name: Install Playwright browsers
              run: |
                  sudo find /etc/apt/sources.list.d -type f \( -name '*.list' -o -name '*.sources' \) \
                      -exec grep -lE 'packages\.microsoft\.com' {} + 2>/dev/null | xargs -r sudo rm -f || true
                  cd frontend && yarn e2e:install

            - name: Download Auth State
              uses: actions/download-artifact@v5
              with:
                  name: stress-auth
                  path: frontend/e2e-stress/.auth/

            - name: Run Cleanup and Teardown
              env:
                  STRESS_SKIP_SETUP: 'true'
                  STRESS_SKIP_TEARDOWN: 'false'
              run: |
                  cd frontend
                  yarn playwright test --config=playwright.stress.config.js e2e-stress/specs/00-gates.spec.js

            - name: Upload Teardown Log
              if: always()
              uses: actions/upload-artifact@v5
              with:
                  name: stress-teardown-log
                  path: frontend/e2e-stress/.auth/teardown.json
                  retention-days: 14
                  if-no-files-found: ignore
