name: F8A Stress Suite (full one-shot)

# Task #163 — runs the entire F8A stress suite (`yarn test:e2e:stress`) in a
# single deterministic shot (seed → all 26 tests in order → cleanup), instead of
# the chunked `-g <pattern>` runs we use locally on the Replit agent sandbox
# (110s tool-budget gotcha — see docs/GOTCHAS.md "F8A Stress Suite"). One-shot
# coverage catches ordering / state-sharing regressions that chunked runs miss.
#
# Schedule:
#   - Nightly cron at 02:30 UTC.
#   - Manual `workflow_dispatch` for ad-hoc verification (optional report tag).
#
# Hard-fail gates (any one → job fails):
#   1. Playwright exit code != 0
#       (covers: test failures, FAIL adımlar via `expect().not.toBe('FAIL')`,
#        globalSetup throws — 5 backend gates, `external_calls_made:[]`,
#        STRESS_TENANT_ID != PILOT_TENANT_ID, destructive flag, dry-run flag).
#   2. globalTeardown invariants — cleanup#1 ok, cleanup#2 idempotent, pilot
#      drift=0 (throws inside teardown → process exits non-zero).
#   3. Verdict scrape: drill report `Final verdict` row must be `GO` or
#      `GO WITH WATCH`; `NO-GO` aborts the workflow even if Playwright somehow
#      exited 0. This is the belt-and-suspenders check the chunked-run setup
#      cannot give us.
#
# Outputs: one consolidated drill report
#   `docs/drill_reports/YYYYMMDD_stress_<TAG>.md` (single TAG per run, no chunk
#   sidecars), plus the Playwright HTML report and traces uploaded as artifacts.

on:
    schedule:
        - cron: '30 2 * * *'
    workflow_dispatch:
        inputs:
            report_tag:
                description: 'STRESS_REPORT_TAG (drill report filename suffix). Default: f8a_frontoffice_folio_hk'
                required: false
                default: 'f8a_frontoffice_folio_hk'
            room_count:
                description: 'E2E_ROOM_COUNT (seed size). Default: 500'
                required: false
                default: '500'

env:
    NODE_VERSION: '22'

jobs:
    stress:
        name: F8A stress (full suite, one-shot)
        runs-on: ubuntu-latest
        # Architect target: 10–15 dk. 12 dk Playwright + ~3 dk install/upload.
        timeout-minutes: 15
        env:
            # Public stress environment (NOT pilot). Provided via repo secrets.
            E2E_BASE_URL: ${{ secrets.STRESS_E2E_BASE_URL }}
            # Pilot super_admin — required by /api/admin/stress/* (require_super_admin).
            E2E_ADMIN_EMAIL: ${{ secrets.STRESS_PILOT_ADMIN_EMAIL }}
            E2E_ADMIN_PASSWORD: ${{ secrets.STRESS_PILOT_ADMIN_PASSWORD }}
            # Stress tenant admin (login + post-seed snapshots).
            E2E_STRESS_ADMIN_EMAIL: ${{ secrets.STRESS_TENANT_ADMIN_EMAIL }}
            E2E_STRESS_ADMIN_PASSWORD: ${{ secrets.STRESS_TENANT_ADMIN_PASSWORD }}
            # Tenant isolation gates — must NOT be equal.
            E2E_STRESS_TENANT_ID: ${{ secrets.STRESS_TENANT_ID }}
            PILOT_TENANT_ID: ${{ secrets.PILOT_TENANT_ID }}
            # Fail-closed flags — globalSetup throws if either is not exactly "true".
            E2E_ALLOW_DESTRUCTIVE_STRESS: 'true'
            E2E_EXTERNAL_DRY_RUN: 'true'
            # Single consolidated report (overrides per-chunk tagging used locally).
            STRESS_REPORT_TAG: ${{ github.event.inputs.report_tag || 'f8a_frontoffice_folio_hk' }}
            STRESS_REPORT_TITLE: 'F8A Stress (CI one-shot) — Front Office + Folio + Housekeeping'
            E2E_ROOM_COUNT: ${{ github.event.inputs.room_count || '500' }}
            CI: 'true'
        steps:
            - uses: actions/checkout@v5

            - name: Pre-flight — required secrets present
              # Hard-fail before we install anything if any required secret is
              # missing. Cheaper to fail here than after a 5-min install.
              run: |
                  missing=()
                  for v in E2E_BASE_URL E2E_ADMIN_EMAIL E2E_ADMIN_PASSWORD \
                           E2E_STRESS_ADMIN_EMAIL E2E_STRESS_ADMIN_PASSWORD \
                           E2E_STRESS_TENANT_ID PILOT_TENANT_ID; do
                      if [ -z "${!v}" ]; then missing+=("$v"); fi
                  done
                  if [ "$E2E_STRESS_TENANT_ID" = "$PILOT_TENANT_ID" ]; then
                      echo "::error::E2E_STRESS_TENANT_ID == PILOT_TENANT_ID — fail-closed."
                      exit 1
                  fi
                  if [ ${#missing[@]} -ne 0 ]; then
                      echo "::error::Missing required secrets: ${missing[*]}"
                      exit 1
                  fi
                  echo "✓ Pre-flight gates OK"

            - name: Set up Node.js
              uses: actions/setup-node@v5
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: 'yarn'
                  cache-dependency-path: frontend/yarn.lock

            - name: Install frontend deps
              run: cd frontend && yarn install --ignore-engines --frozen-lockfile

            - name: Install Playwright browsers
              run: cd frontend && yarn e2e:install

            - name: Run F8A stress suite (full one-shot)
              # No `-g` filter, no chunking — entire suite (00..08, 26 tests)
              # runs sequentially in a single Playwright process. workers=1 is
              # already enforced by playwright.stress.config.js.
              run: cd frontend && yarn test:e2e:stress

            - name: Verify drill report verdict (hard-fail on NO-GO)
              # Belt-and-suspenders: the markdown reporter writes a verdict row
              # based on counters + teardown snapshot + sevAgg. We grep for it
              # and abort if NO-GO somehow slipped past Playwright's exit code
              # (e.g. counters.FAIL>0 recorded via annotation but no test
              # assertion failed). Runs unconditionally so the artifact upload
              # below still gets the report even when this gate trips.
              if: always()
              run: |
                  set -euo pipefail
                  report=$(ls -1t docs/drill_reports/*_stress_${STRESS_REPORT_TAG}.md 2>/dev/null | head -n1 || true)
                  if [ -z "$report" ]; then
                      echo "::error::No stress drill report found for tag=${STRESS_REPORT_TAG}"
                      exit 1
                  fi
                  echo "Drill report: $report"
                  verdict_line=$(grep -E '^\| Final verdict \|' "$report" || true)
                  echo "Verdict line: $verdict_line"
                  if echo "$verdict_line" | grep -q 'NO-GO'; then
                      echo "::error::Stress verdict is NO-GO — see $report"
                      exit 1
                  fi
                  if ! echo "$verdict_line" | grep -qE 'GO( WITH WATCH)?'; then
                      echo "::error::Verdict line missing or unparseable in $report"
                      exit 1
                  fi
                  echo "✓ Verdict gate passed"

            - name: Upload Playwright HTML report
              if: always()
              uses: actions/upload-artifact@v5
              with:
                  name: playwright-stress-report
                  path: frontend/playwright-stress-report/
                  retention-days: 30

            - name: Upload drill report (markdown)
              if: always()
              uses: actions/upload-artifact@v5
              with:
                  name: stress-drill-report
                  path: docs/drill_reports/*_stress_${{ github.event.inputs.report_tag || 'f8a_frontoffice_folio_hk' }}.md
                  retention-days: 90
                  if-no-files-found: warn

            - name: Upload traces / videos / screenshots
              if: always()
              uses: actions/upload-artifact@v5
              with:
                  name: stress-test-results
                  path: frontend/test-results-stress/
                  retention-days: 14
                  if-no-files-found: ignore
