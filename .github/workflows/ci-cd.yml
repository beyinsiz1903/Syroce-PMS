name: Syroce PMS CI/CD Pipeline

on:
  push:
    branches: [main, develop, staging]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'
  MONGO_URL: mongodb://localhost:27017/hotel_pms_test
  DB_NAME: hotel_pms_test
  JWT_SECRET: ci-test-secret-key-do-not-use-in-production

jobs:
  # ============ BACKEND LINTING (HARD GATE) ============
  backend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff (pyproject.toml config)
        run: |
          cd backend
          ruff check .

  # ============ FRONTEND LINTING (HARD GATE) ============
  frontend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'
          cache-dependency-path: frontend/yarn.lock

      - name: Install dependencies
        run: |
          cd frontend
          yarn install --ignore-engines

      - name: Run ESLint (hard gate)
        run: |
          cd frontend
          npx eslint src/ --quiet

  # ============ BACKEND TESTS (HARD GATE) ============
  backend-test:
    runs-on: ubuntu-latest
    needs: backend-lint
    services:
      mongodb:
        image: mongo:7.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ping:1})'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install backend dependencies
        run: |
          cd backend
          pip install -r requirements.txt --extra-index-url https://d33sy5i8bnduwe.cloudfront.net/simple/
          pip install pytest pytest-asyncio httpx pytest-cov pytest-timeout

      - name: Seed test database
        run: |
          cd backend
          python create_test_user.py || python create_demo_users.py || echo "Seed script not found - will create user in test"
        env:
          MONGO_URL: ${{ env.MONGO_URL }}
          DB_NAME: ${{ env.DB_NAME }}

      - name: Start backend server
        run: |
          cd backend
          uvicorn server:app --host 0.0.0.0 --port 8001 &
          for i in $(seq 1 30); do
            if curl -s http://localhost:8001/api/docs > /dev/null 2>&1; then
              echo "Server ready"
              break
            fi
            sleep 2
          done
        env:
          MONGO_URL: ${{ env.MONGO_URL }}
          DB_NAME: ${{ env.DB_NAME }}
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: ${{ env.JWT_SECRET }}
          TESTING: "1"

      - name: Run curated CI test suite (hard gate)
        run: |
          cd backend
          python -m pytest \
            tests/test_hardening_comprehensive.py \
            tests/resilience/ \
            tests/test_controlplane.py \
            tests/test_crypto_engine.py \
            tests/test_outbox_pattern.py \
            tests/test_import_bridge.py \
            tests/test_helpers.py \
            tests/test_core_lockdown.py \
            tests/test_audit_service_wiring.py \
            tests/test_hardening_multi_phase.py \
            tests/test_atomic_booking.py \
            tests/battle/test_booking_integrity.py \
            tests/battle/test_sprint2_hold_ooo.py \
            tests/battle/test_regression_guards.py \
            -v --tb=short -q --timeout=30 --junitxml=test-results.xml
        env:
          MONGO_URL: ${{ env.MONGO_URL }}
          DB_NAME: ${{ env.DB_NAME }}
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: ${{ env.JWT_SECRET }}
          REACT_APP_BACKEND_URL: http://localhost:8001

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-results
          path: backend/test-results.xml

  # ============ FRONTEND BUILD (HARD GATE) ============
  frontend-build:
    runs-on: ubuntu-latest
    needs: frontend-lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'
          cache-dependency-path: frontend/yarn.lock

      - name: Install dependencies
        run: |
          cd frontend
          yarn install --ignore-engines

      - name: Build production bundle (hard gate)
        run: |
          cd frontend
          yarn build
        env:
          CI: false
          REACT_APP_BACKEND_URL: http://localhost:8001

      - name: Check bundle size
        run: |
          cd frontend
          du -sh build/
          echo "--- JS Bundle Sizes ---"
          find build/static/js -name "*.js" -exec du -sh {} \; | sort -rh | head -10

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/build/

  # ============ SECURITY SCAN (HARD GATE) ============
  security-scan:
    runs-on: ubuntu-latest
    needs: [backend-lint, frontend-lint]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'
          cache-dependency-path: frontend/yarn.lock

      - name: Install frontend dependencies
        run: |
          cd frontend
          yarn install --ignore-engines

      - name: Python dependency security audit (CRITICAL — hard gate)
        run: |
          pip install pip-audit
          cd backend
          pip-audit -r requirements.txt --desc \
            --extra-index-url https://d33sy5i8bnduwe.cloudfront.net/simple/ \
            2>&1 | tee security-report.txt
          echo "--- Checking for CRITICAL/HIGH vulnerabilities ---"
          pip-audit -r requirements.txt \
            --extra-index-url https://d33sy5i8bnduwe.cloudfront.net/simple/ \
            --ignore-vuln PYSEC-2024-62920 \
            --ignore-vuln PYSEC-2024-113 \
            || { echo "::error::CRITICAL vulnerabilities found — see security-report.txt"; exit 1; }

      - name: Node.js dependency security audit (critical — hard gate)
        run: |
          cd frontend
          yarn audit --level critical

      - name: Check for hardcoded secrets (hard gate)
        run: |
          echo "Scanning for potential secrets..."
          FOUND=0

          # Check for hardcoded passwords in non-test Python files
          grep -rn "password\s*=\s*['\"][^'\"]\{8,\}" backend/ --include="*.py" \
            --exclude="*test*" --exclude="*demo*" --exclude="*seed*" \
            --exclude="*create_*" --exclude="requirements.txt" \
            --exclude="*conftest*" && FOUND=1 || true

          # Check for hardcoded API keys / secret keys
          grep -rn "api_key\s*=\s*['\"]sk-" backend/ --include="*.py" \
            --exclude="*test*" --exclude="*.env" && FOUND=1 || true

          # Check for hardcoded JWT secrets
          grep -rn "JWT_SECRET\s*=\s*['\"]" backend/ --include="*.py" \
            --exclude="*test*" --exclude="*.env" && FOUND=1 || true

          # Check for AWS/cloud credentials
          grep -rn "AKIA[A-Z0-9]\{16\}" backend/ --include="*.py" && FOUND=1 || true

          if [ "$FOUND" -eq 1 ]; then
            echo "::error::Hardcoded secrets detected — fix before merge"
            exit 1
          else
            echo "No hardcoded secrets found"
          fi

      - name: Trivy filesystem scan (CRITICAL — hard gate)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL
          exit-code: 1

      - name: Trivy HIGH severity (warning only)
        if: always()
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH
          exit-code: 0

      - name: Upload security report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-report
          path: backend/security-report.txt

  # ============ DOCKER BUILD (HARD GATE) ============
  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build, security-scan]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        run: docker build -t syroce-backend:${{ github.sha }} ./backend

      - name: Build frontend image
        run: docker build -t syroce-frontend:${{ github.sha }} --build-arg REACT_APP_BACKEND_URL=${{ secrets.REACT_APP_BACKEND_URL }} ./frontend

      - name: Build worker image
        run: docker build -t syroce-worker:${{ github.sha }} -f ./worker/Dockerfile .

  # ============ DEPLOY STAGING ============
  deploy-staging:
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.ref == 'refs/heads/staging'
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to staging
        run: |
          echo "TODO: Configure staging deployment"
          echo "Required: Set KUBECONFIG or deployment target in GitHub Secrets"
          echo "SHA: ${{ github.sha }}"
          exit 1
        # Uncomment and configure when ready:
        # kubectl set image deployment/backend backend=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:${{ github.sha }}
        # kubectl set image deployment/frontend frontend=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:${{ github.sha }}

  # ============ DEPLOY PRODUCTION ============
  deploy-production:
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to production
        run: |
          echo "TODO: Configure production deployment"
          echo "Required: Set KUBECONFIG or deployment target in GitHub Secrets"
          echo "SHA: ${{ github.sha }}"
          exit 1

      - name: Verify production health
        if: success()
        run: |
          echo "TODO: Configure production health check URL"
          # curl -f https://app.syroce.com/api/health/
