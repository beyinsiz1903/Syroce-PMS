<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; }
html, body {
  width: 100vw;
  height: 100vh;
  background: radial-gradient(ellipse at center, #0f2140 0%, #0a1628 45%, #060e1a 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

.glow-layer {
  position: absolute;
  width: 35vw;
  height: 35vw;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -55%);
  background: radial-gradient(circle, rgba(37,99,235,0.18) 0%, rgba(6,182,212,0.1) 35%, transparent 65%);
  border-radius: 50%;
  filter: blur(60px);
}

.glow-layer-2 {
  position: absolute;
  width: 20vw;
  height: 20vw;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -55%);
  background: radial-gradient(circle, rgba(6,182,212,0.14) 0%, rgba(37,99,235,0.07) 45%, transparent 75%);
  border-radius: 50%;
  filter: blur(35px);
}

.content {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2.5vw;
  position: relative;
  z-index: 2;
  margin-top: -3vw;
}

.logo-icon svg {
  width: 12vw;
  height: 12vw;
  filter: drop-shadow(0 0 25px rgba(37,99,235,0.35)) drop-shadow(0 0 50px rgba(6,182,212,0.18));
}

.logo-text {
  font-family: 'Arial', 'Helvetica Neue', sans-serif;
  font-size: 3.5vw;
  font-weight: 700;
  color: #ffffff;
  letter-spacing: 0.4vw;
  text-shadow: 0 0 35px rgba(37,99,235,0.35), 0 0 70px rgba(6,182,212,0.12);
}

.subtitle {
  font-family: 'Arial', 'Helvetica Neue', sans-serif;
  font-size: 1vw;
  font-weight: 400;
  color: rgba(148,163,184,0.65);
  letter-spacing: 0.5vw;
  margin-top: -1.5vw;
}
</style>
</head>
<body>
  <div class="glow-layer"></div>
  <div class="glow-layer-2"></div>
  <div class="content">
    <div class="logo-icon">
      <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
          </linearGradient>
        </defs>
        <g transform="translate(4, 4)">
          <path d="M 10 10 L 20 0 L 30 10" stroke="url(#iconGradient)" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M 15 15 Q 10 15 10 20 Q 10 23 15 23 L 25 23 Q 30 23 30 28 Q 30 33 25 33" stroke="url(#iconGradient)" stroke-width="3" fill="none" stroke-linecap="round"/>
          <line x1="8" y1="37" x2="32" y2="37" stroke="url(#iconGradient)" stroke-width="2" stroke-linecap="round"/>
        </g>
      </svg>
    </div>
    <div class="logo-text">Syroce</div>
    <div class="subtitle">HOTEL MANAGEMENT</div>
  </div>
</body>
</html>
