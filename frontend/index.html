            window.addEventListener('error', function(e) {
                if (e.message && e.message.indexOf('ResizeObserver loop') !== -1) {
                    e.stopImmediatePropagation();
                    e.stopPropagation();
                    e.preventDefault();

            // Stale-chunk self-heal: after a new deploy, an already-open tab still
            // holds the previous index.html in memory and requests hashed chunks
            // that no longer exist. The server returns a clean 404 for those, so
            // the dynamic import rejects with a chunk-load error and the app is
            // stuck until a manual refresh. Reload ONCE to pull the fresh
            // index.html + new chunk names. A one-shot latch (sessionStorage +
            // in-memory + URL-marker fallback) prevents a reload loop if a deploy
            // is genuinely broken — and lets the recurring error reach Sentry.
            (function () {
                var CHUNK_ERR = [
                    'Importing a module script failed',
                    'Failed to fetch dynamically imported module',
                    'error loading dynamically imported module',
                    'is not a valid JavaScript MIME type',
                    'Unable to preload CSS'
                ];
                function isChunkError(msg) {
                    if (!msg) return false;
                    for (var i = 0; i < CHUNK_ERR.length; i++) {
                        if (msg.indexOf(CHUNK_ERR[i]) !== -1) return true;
                    }
                    return false;
                }
                // Truly one-shot per tab. If we ALREADY healed once in this tab and
                // the same chunk error recurs after the reload, the deploy is
                // genuinely broken — do NOT reload again (no loop) and let the error
                // surface to Sentry (window.__syroceChunkHealing stays false).
                function alreadyHealed() {
                    if (window.__syroceChunkReloaded) return true;
                    try { if (sessionStorage.getItem('syroce_chunk_reload_done') === '1') return true; } catch (_) {}
                    // storage-denied fallback: a URL marker survives the reload.
                    if (window.location.search.indexOf('_chunkreload=1') !== -1) return true;
                    return false;
                }
                function reloadOnce() {
                    if (alreadyHealed()) return;
                    window.__syroceChunkReloaded = true;   // in-memory latch (loop-safe even if storage denied)
                    window.__syroceChunkHealing = true;    // tells Sentry beforeSend this incident is benign
                    var stored = false;
                    try { sessionStorage.setItem('syroce_chunk_reload_done', '1'); stored = true; } catch (_) {}
                    if (stored) {
                        window.location.reload();
                    } else {
                        // No storage: pin the latch in the URL so the next load sees it.
                        var u = new URL(window.location.href);
                        u.searchParams.set('_chunkreload', '1');
                        window.location.replace(u.toString());
                    }
                }
                window.addEventListener('vite:preloadError', function (e) {
                    if (e && e.preventDefault) e.preventDefault();
                    reloadOnce();
                });
                window.addEventListener('error', function (e) {
                    if (isChunkError(e && e.message)) reloadOnce();
                });
                window.addEventListener('unhandledrejection', function (e) {
                    var r = e && e.reason;
                    var msg = r && (r.message || (typeof r === 'string' ? r : ''));
                    if (isChunkError(msg)) reloadOnce();
                });
            })();
        </script>
